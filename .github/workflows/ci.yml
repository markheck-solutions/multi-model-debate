name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run ruff (lint)
        run: ruff check src/ tests/ scripts/

      - name: Run ruff (format check)
        run: ruff format --check src/ tests/ scripts/

      - name: Run C901 complexity gate
        run: ruff check --select C901 --config "lint.mccabe.max-complexity=10" src/ tests/ scripts/

      - name: Run mypy (type check)
        run: mypy src/

      - name: Run SQL supportability gate
        run: python scripts/validate_sql_supportability.py

      - name: Run pytest with coverage
        run: |
          pytest tests/ -v --cov=src/multi_model_debate --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: matrix.python-version == '3.12'
        with:
          files: coverage.xml
          fail_ci_if_error: false

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Run frontend lint
        working-directory: web
        run: npm run lint

      - name: Run frontend typecheck
        working-directory: web
        run: npm run typecheck

      - name: Run frontend tests
        working-directory: web
        run: npm test

      - name: Build frontend
        working-directory: web
        run: npm run build

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Verify wheel contents
        run: |
          pip install dist/*.whl
          multi-model-debate --version
